<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f0f3f7; padding: 40px; }
        .admin-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #6c5ce7; color: white; }
        .delete-btn { background: #ff7675; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-box">
    <h1>Child Assessment Records 📊</h1>
    <table id="admin-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Age Group</th>
                <th>Total Score</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="admin-body"></tbody>
    </table>
    <button onclick="localStorage.removeItem('mentalHealthScores'); location.reload();" style="margin-top:20px;">Clear All Data</button>
</div>

<script>
    function renderTable() {
        const records = JSON.parse(localStorage.getItem('mentalHealthScores')) || [];
        const tbody = document.getElementById('admin-body');
        tbody.innerHTML = records.map(r => `
            <tr>
                <td>${r.date}</td>
                <td>${r.ageGroup}</td>
                <td>${r.score}</td>
                <td><button class="delete-btn" onclick="deleteItem(${r.id})">Delete</button></td>
            </tr>
        `).reverse().join('');
    }

    function deleteItem(id) {
        let records = JSON.parse(localStorage.getItem('mentalHealthScores'));
        records = records.filter(r => r.id !== id);
        localStorage.setItem('mentalHealthScores', JSON.stringify(records));
        renderTable();
    }

    window.onload = renderTable;
</script>
</body>
</html>
