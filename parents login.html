<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Login</title>

  <style>
    /* ... [Keep existing styles from parents login.html] ... */
    body { font-family: Arial, sans-serif; background: linear-gradient(to right, #74ebd5, #ACB6E5); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
    header { background: #ffffff; padding: 10px 20px; width: 100%; position: absolute; top: 0; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .container { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); width: 350px; }
    h2 { text-align: center; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; }
    input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;}
    .btn { width: 100%; padding: 12px; background: #0984e3; border: none; border-radius: 8px; color: white; cursor: pointer; }
    nav a { text-decoration: none; color: #4aa3a2; font-weight: bold; }
  </style>
</head>
<body>

<header>
  <h1 style="color:#4aa3a2; font-size: 18px;">WellMind Kids</h1>
  <nav><a href="top.html">Back to Home</a></nav>
</header>

<div class="container">
  <h2>Parent Login</h2>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" required>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" required>
  </div>
  <button class="btn" onclick="parentLogin()">Login</button>
</div>

<script>
  function parentLogin() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if (!email || !password) {
      alert("Enter email and password");
      return;
    }
    const parents = JSON.parse(localStorage.getItem("parentLogins")) || [];
    parents.push({ email: email, time: new Date().toLocaleString() });
    localStorage.setItem("parentLogins", JSON.stringify(parents));
    window.location.href = "home page.html";
  }
</script>
</body>
</html>
